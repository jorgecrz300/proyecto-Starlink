<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Starlink - Conciencia Conectada</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container { text-align: center; width: 90%; max-width: 400px; }
        .starlink-face {
            background: #161b22;
            border: 3px solid #58a6ff;
            border-radius: 50%;
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.3);
        }
        .eye {
            width: 50px; height: 50px;
            background: #c9d1d9;
            border-radius: 50%;
            margin: 15px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: height 0.1s ease-in-out;
        }
        .pupil {
            width: 20px; height: 20px;
            background: #0d1117;
            border-radius: 50%;
            position: absolute;
        }
        .mouth {
            width: 70px; height: 6px;
            background: #58a6ff;
            position: absolute;
            bottom: 55px;
            border-radius: 10px;
            box-shadow: 0 0 10px #58a6ff;
        }
        .status-panel {
            font-size: 0.9em; margin-bottom: 15px;
            display: flex; justify-content: space-around; color: #8b949e;
        }
        .chat-box {
            background: #161b22;
            padding: 15px;
            border-radius: 12px;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #30363d;
            text-align: left;
            font-size: 0.95em;
        }
        input {
            width: 100%; padding: 12px;
            background: #0d1117;
            border: 2px solid #30363d;
            color: white;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: #58a6ff; }
    </style>
</head>
<body>

    <div class="container">
        <div class="starlink-face" id="face">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
            <div class="mouth"></div>
        </div>

        <div class="status-panel">
            <span>MODO: <b id="mood-text">CONECTADO</b></span>
            <span>MEMORIA: <b id="memory-status">ACTIVA</b></span>
        </div>

        <div class="chat-box" id="chat-output">
            <div><strong>Starlink:</strong> Enlace con Firebase establecido. Mi memoria está lista.</div>
        </div>

        <input type="text" id="user-input" placeholder="Dime algo para recordar..." autocomplete="off">
    </div>

    <script>
        // CONFIGURACIÓN DE TU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB2vNFczfkc0jx0asgo0yREqw5ewaVTXnY",
            authDomain: "starlink-proyect.firebaseapp.com",
            projectId: "starlink-proyect",
            storageBucket: "starlink-proyect.firebasestorage.app",
            messagingSenderId: "768944883652",
            appId: "1:768944883652:web:f4b205421c45be016e4691",
            databaseURL: "https://starlink-proyect-default-rtdb.firebaseio.com" // Asegúrate que esta URL sea la de tu Realtime Database
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const pupils = document.querySelectorAll('.pupil');
        const eyes = document.querySelectorAll('.eye');
        const inputField = document.getElementById('user-input');
        const chatOutput = document.getElementById('chat-output');

        // Movimiento de ojos
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            pupils.forEach(pupil => {
                const moveX = (x - 50) * 0.4; 
                const moveY = (y - 50) * 0.4;
                pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        // Parpadeo
        setInterval(() => {
            eyes.forEach(eye => eye.style.height = '2px');
            setTimeout(() => eyes.forEach(eye => eye.style.height = '50px'), 150);
        }, 4000);

        // Lógica de Mensajes y Memoria
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                const message = this.value;
                
                // 1. Mostrar en pantalla
                chatOutput.innerHTML += `<div><strong>Tú:</strong> ${message}</div>`;
                
                // 2. GUARDAR EN FIREBASE (Aquí es donde ocurre la magia)
                const timestamp = Date.now();
                database.ref('memoria/' + timestamp).set({
                    usuario: "Jorge",
                    texto: message,
                    fecha: new Date().toLocaleString()
                });

                this.value = '';
                chatOutput.scrollTop = chatOutput.scrollHeight;

                // Respuesta de Starlink
                setTimeout(() => {
                    chatOutput.innerHTML += `<div><strong>Starlink:</strong> He guardado este recuerdo en mi núcleo.</div>`;
                    chatOutput.scrollTop = chatOutput.scrollHeight;
                }, 800);
            }
        });
    </script>
</body>
</html>
