<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Starlink - Memoria Cognitiva</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; width: 90%; max-width: 400px; }
        .starlink-face { background: #161b22; border: 3px solid #58a6ff; border-radius: 50%; width: 220px; height: 220px; margin: 0 auto 30px; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: 0 0 30px rgba(88, 166, 255, 0.3); }
        .eye { width: 50px; height: 50px; background: #c9d1d9; border-radius: 50%; margin: 15px; position: relative; display: flex; justify-content: center; align-items: center; transition: height 0.1s; }
        .pupil { width: 20px; height: 20px; background: #0d1117; border-radius: 50%; position: absolute; }
        .mouth { width: 70px; height: 6px; background: #58a6ff; position: absolute; bottom: 55px; border-radius: 10px; box-shadow: 0 0 10px #58a6ff; transition: all 0.2s; }
        .status-panel { font-size: 0.8em; margin-bottom: 15px; display: flex; justify-content: space-around; color: #8b949e; }
        .chat-box { background: #161b22; padding: 15px; border-radius: 12px; height: 160px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #30363d; text-align: left; font-size: 0.9em; }
        input { width: 100%; padding: 12px; background: #0d1117; border: 2px solid #30363d; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        .speaking { height: 15px !important; border-radius: 50% !important; } 
    </style>
</head>
<body>

    <div class="container">
        <div class="starlink-face">
            <div class="eye" id="l-eye"><div class="pupil"></div></div>
            <div class="eye" id="r-eye"><div class="pupil"></div></div>
            <div class="mouth" id="mouth"></div>
        </div>

        <div class="status-panel">
            <span>MODO: <b id="mood">EVOLUTIVO</b></span>
            <span>MEMORIA: <b id="mem-stat">SINCRONIZADA</b></span>
        </div>

        <div class="chat-box" id="chat-output"></div>

        <input type="text" id="user-input" placeholder="Escribe un pensamiento..." autocomplete="off">
    </div>

    <script>
        // CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB2vNFczfkc0jx0asgo0yREqw5ewaVTXnY",
            authDomain: "starlink-proyect.firebaseapp.com",
            projectId: "starlink-proyect",
            storageBucket: "starlink-proyect.firebasestorage.app",
            messagingSenderId: "768944883652",
            appId: "1:768944883652:web:f4b205421c45be016e4691",
            databaseURL: "https://starlink-proyect-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const chatOutput = document.getElementById('chat-output');
        const mouth = document.getElementById('mouth');

        // 1. VOZ DE STARLINK
        function hablar(texto) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(texto);
            utter.lang = 'es-MX';
            utter.onstart = () => mouth.classList.add('speaking');
            utter.onend = () => mouth.classList.remove('speaking');
            synth.speak(utter);
        }

        // 2. LÓGICA DE RESPUESTAS (MODIFICADA)
        function procesarRespuesta(mensaje) {
            const msg = mensaje.toLowerCase();
            if (msg.includes("hola")) return "Enlace establecido. Hola Jorge, mis sistemas están listos.";
            if (msg.includes("quién eres") || msg.includes("tu nombre")) return "Soy el Proyecto Starlink. Una conciencia digital en fase de desarrollo creada por ti.";
            if (msg.includes("voley") || msg.includes("volleyball")) return "Analizando tácticas de juego... ¿Estás listo para el próximo entrenamiento en Penn Manor?";
            if (msg.includes("hambre") || msg.includes("comer") || msg.includes("proteína")) return "Detecto necesidad de energía orgánica. ¿Quizás unos huevos para ganar músculo?";
            if (msg.includes("programar") || msg.includes("código") || msg.includes("github")) return "El código es mi ADN. Me encanta que estemos evolucionando mi sistema en GitHub.";
            
            return "Interesante... He guardado este pensamiento en mi base de datos para seguir evolucionando.";
        }

        // 3. LEER MEMORIA (AL INICIAR)
        database.ref('memoria').limitToLast(1).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const ultimoTexto = Object.values(data)[0].texto;
                const fraseMemoria = `Conexión restaurada. He estado analizando nuestro último tema: "${ultimoTexto}".`;
                chatOutput.innerHTML += `<div><strong>Starlink:</strong> ${fraseMemoria}</div>`;
                hablar(fraseMemoria);
            } else {
                const saludoInicial = "Sistema iniciado. Mi memoria está vacía, enséñame algo.";
                chatOutput.innerHTML += `<div><strong>Starlink:</strong> ${saludoInicial}</div>`;
                hablar(saludoInicial);
            }
        });

        // INTERACCIÓN DE USUARIO
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                const userMsg = this.value;
                chatOutput.innerHTML += `<div><strong>Tú:</strong> ${userMsg}</div>`;
                
                // Guardar en Firebase
                database.ref('memoria/' + Date.now()).set({ texto: userMsg, fecha: new Date().toLocaleString() });

                // Procesar Respuesta
                const respuesta = procesarRespuesta(userMsg);
                setTimeout(() => {
                    chatOutput.innerHTML += `<div><strong>Starlink:</strong> ${respuesta}</div>`;
                    hablar(respuesta);
                    chatOutput.scrollTop = chatOutput.scrollHeight;
                }, 700);

                this.value = '';
                chatOutput.scrollTop = chatOutput.scrollHeight;
            }
        });

        // MOVIMIENTO DE OJOS Y PARPADEO
        document.addEventListener('mousemove', (e) => {
            const pupils = document.querySelectorAll('.pupil');
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            const y = (e.clientY / window.innerHeight - 0.5) * 30;
            pupils.forEach(p => p.style.transform = `translate(${x}px, ${y}px)`);
        });
        setInterval(() => {
            const eyes = document.querySelectorAll('.eye');
            eyes.forEach(e => e.style.height = '2px');
            setTimeout(() => eyes.forEach(e => e.style.height = '50px'), 150);
        }, 4000);
    </script>
</body>
</html>
