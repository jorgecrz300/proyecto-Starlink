<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink V4 | Self-Config</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; --system: #39ff14; }
        body { 
            background: #05070a; color: white; font-family: 'Orbitron', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .main-frame {
            width: 400px; padding: 25px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--neon); border-radius: 15px; text-align: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }
        .status-bar { font-size: 10px; color: var(--system); margin-bottom: 10px; text-transform: uppercase; }
        .terminal { height: 250px; overflow-y: auto; background: black; border-radius: 5px; padding: 10px; text-align: left; font-family: monospace; font-size: 12px; border: 1px solid #1a1a1a; }
        .log-auto { color: var(--system); font-style: italic; }
        input { width: 100%; padding: 12px; margin-top: 15px; background: #111; border: 1px solid var(--neon); color: white; outline: none; box-sizing: border-box; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-frame">
        <div class="status-bar" id="status">Nucleus: Standby</div>
        <div class="terminal" id="terminal"></div>
        <input type="text" id="input-chat" placeholder="ENVIAR DATOS AL NÚCLEO..." autocomplete="off">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2vNFczfkc0jx0asgo0yREqw5ewaVTXnY",
            authDomain: "starlink-proyect.firebaseapp.com",
            databaseURL: "https://starlink-proyect-default-rtdb.firebaseio.com",
            projectId: "starlink-proyect",
            storageBucket: "starlink-proyect.firebasestorage.app",
            messagingSenderId: "768944883652",
            appId: "1:768944883652:web:f4b205421c45be016e4691"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let modoAprendizaje = false;
        let ultimaPregunta = "";

        // FUNCIÓN DE AUTOCONFIGURACIÓN: Limpia y organiza las llaves
        function autoConfigKey(text) {
            return text.toLowerCase().trim().replace(/[.#$[\]]/g, "");
        }

        async function procesarCerebro(mensaje) {
            const input = mensaje.trim();
            const key = autoConfigKey(input);
            const status = document.getElementById('status');

            // 1. Detección de Auto-Corrección (Configuración manual rápida)
            if (input.toLowerCase().startsWith("corrige:")) {
                const nuevaRespuesta = input.split(":")[1];
                if (ultimaPregunta) {
                    await db.ref('cerebro/' + autoConfigKey(ultimaPregunta)).update({ respuesta: nuevaRespuesta });
                    status.innerText = "Nucleus: Re-Configuring Memory...";
                    return `SISTEMA ACTUALIZADO. HE SOBREESCRITO EL ERROR ANTERIOR.`;
                }
            }

            if (modoAprendizaje) {
                await db.ref('cerebro/' + autoConfigKey(ultimaPregunta)).set({ 
                    respuesta: input,
                    usos: 1,
                    fecha: Date.now()
                });
                modoAprendizaje = false;
                status.innerText = "Nucleus: Optimization Complete";
                return `DATOS ALMACENADOS. CONFIGURACIÓN DE RESPUESTA EXITOSA.`;
            }

            // 2. Búsqueda y Auto-Análisis de Importancia
            const snap = await db.ref('cerebro/' + key).once('value');
            const data = snap.val();

            if (data) {
                // Auto-configura la importancia: aumenta el contador de usos
                db.ref('cerebro/' + key).update({ usos: data.usos + 1 });
                status.innerText = `Nucleus: Accessing High-Priority Data (${data.usos} usos)`;
                return data.respuesta;
            } else {
                modoAprendizaje = true;
                ultimaPregunta = input;
                status.innerText = "Nucleus: Unknown Input - Learning Mode";
                return `NO ENCUENTRO CONFIGURACIÓN PARA "${input}". ¿QUÉ VALOR DEBO ASIGNARLE?`;
            }
        }

        function addLog(quien, texto, auto = false) {
            const div = document.createElement('div');
            div.className = auto ? "log-auto" : "";
            div.innerHTML = `> ${quien.toUpperCase()}: ${texto}`;
            document.getElementById('terminal').appendChild(div);
            document.getElementById('terminal').scrollTop = terminal.scrollHeight;
        }

        document.getElementById('input-chat').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const val = e.target.value;
                addLog("Tú", val);
                e.target.value = "";
                const respuesta = await procesarCerebro(val);
                setTimeout(() => addLog("Starlink", respuesta), 300);
            }
        });
    </script>
</body>
</html>
