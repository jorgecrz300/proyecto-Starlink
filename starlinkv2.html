<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink V2 | Deep Tech</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: radial-gradient(circle at center, #0a111a 0%, #05070a 100%);
            color: white; font-family: 'Orbitron', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .main-frame {
            width: 380px; padding: 25px; background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 20px;
            backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center; border-top: 2px solid var(--neon);
        }
        .core-container { width: 140px; height: 140px; margin: 0 auto 20px; position: relative; display: flex; justify-content: center; align-items: center; }
        .core-ring { position: absolute; width: 100%; height: 100%; border: 1px dashed var(--neon); border-radius: 50%; animation: spin 12s linear infinite; opacity: 0.5; }
        .eye-v2 { width: 70px; height: 70px; background: radial-gradient(circle, var(--neon) 0%, #004e52 100%); border-radius: 50%; box-shadow: 0 0 40px var(--neon); transition: 0.3s; }
        .terminal { height: 180px; overflow-y: auto; background: rgba(0, 0, 0, 0.4); border-radius: 10px; padding: 12px; margin-bottom: 15px; text-align: left; font-family: 'Courier New', monospace; font-size: 13px; border: 1px solid rgba(0,242,255,0.1); }
        .msg-user { color: #8b949e; margin-bottom: 6px; }
        .msg-starlink { color: var(--neon); margin-bottom: 12px; text-shadow: 0 0 5px var(--neon); }
        input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 8px; color: white; outline: none; box-sizing: border-box; font-family: 'Orbitron'; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pulsing { transform: scale(1.15); filter: brightness(1.3); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-frame">
        <div class="core-container">
            <div class="core-ring"></div>
            <div id="eye" class="eye-v2"></div>
        </div>
        <div style="font-size: 9px; letter-spacing: 3px; color: var(--neon); margin-bottom: 20px; font-weight: bold;">STARLINK NUCLEUS [V2.0]</div>
        <div class="terminal" id="terminal"></div>
        <input type="text" id="input-chat" placeholder="INGRESAR COMANDO..." autocomplete="off">
    </div>

    <script>
        // CONFIGURACIÓN QUE ME PASASTE (Convertida para Web)
        const firebaseConfig = {
            apiKey: "AIzaSyB2vNFczfkc0jx0asgo0yREqw5ewaVTXnY",
            authDomain: "starlink-proyect.firebaseapp.com",
            databaseURL: "https://starlink-proyect-default-rtdb.firebaseio.com",
            projectId: "starlink-proyect",
            storageBucket: "starlink-proyect.firebasestorage.app",
            messagingSenderId: "768944883652",
            appId: "1:768944883652:web:f4b205421c45be016e4691",
            measurementId: "G-P22T5TVPRE"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const terminal = document.getElementById('terminal');
        const eye = document.getElementById('eye');

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'es-MX';
            utter.onstart = () => eye.classList.add('pulsing');
            utter.onend = () => eye.classList.remove('pulsing');
            synth.speak(utter);
        }

        async function getIA(mensaje) {
            // RECUERDA: Pon aquí tu llave nueva de AI Studio
            const API_KEY = "AIzaSyC2skAu2XDObQhtU9pDN3fPxHJuJramBfc"; 
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Eres Starlink V2, una IA creada por Jorge. Sé breve y tecnológico: " + mensaje }] }] })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (err) {
                return "ERROR EN NÚCLEO GEMINI. REVISA API KEY.";
            }
        }

        function addLog(quien, texto) {
            const div = document.createElement('div');
            div.className = quien === "Tú" ? "msg-user" : "msg-starlink";
            div.innerHTML = `> ${quien.toUpperCase()}: ${texto}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        db.ref('memoria').limitToLast(1).once('value', (snap) => {
            const saludo = "SISTEMA INICIALIZADO. ESPERANDO ÓRDENES, JORGE.";
            addLog("Starlink", saludo);
            speak(saludo);
        });

        document.getElementById('input-chat').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const val = e.target.value;
                addLog("Tú", val);
                e.target.value = "";
                db.ref('memoria/' + Date.now()).set({ texto: val });
                const respuesta = await getIA(val);
                addLog("Starlink", respuesta);
                speak(respuesta);
            }
        });

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            eye.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
