<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink V3 | Evolución Humana</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: radial-gradient(circle at center, #0a111a 0%, #05070a 100%);
            color: white; font-family: 'Orbitron', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .main-frame {
            width: 380px; padding: 25px; background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 20px;
            backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center; border-top: 2px solid var(--neon);
        }
        .core-container { width: 140px; height: 140px; margin: 0 auto 20px; position: relative; display: flex; justify-content: center; align-items: center; }
        .core-ring { position: absolute; width: 100%; height: 100%; border: 1px dashed var(--neon); border-radius: 50%; animation: spin 12s linear infinite; opacity: 0.5; }
        .eye-v3 { width: 70px; height: 70px; background: radial-gradient(circle, var(--neon) 0%, #004e52 100%); border-radius: 50%; box-shadow: 0 0 40px var(--neon); transition: 0.3s; }
        .terminal { height: 220px; overflow-y: auto; background: rgba(0, 0, 0, 0.4); border-radius: 10px; padding: 12px; margin-bottom: 15px; text-align: left; font-family: 'Courier New', monospace; font-size: 13px; border: 1px solid rgba(0,242,255,0.1); }
        .msg-user { color: #8b949e; margin-bottom: 6px; }
        .msg-starlink { color: var(--neon); margin-bottom: 12px; text-shadow: 0 0 5px var(--neon); }
        input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 8px; color: white; outline: none; box-sizing: border-box; font-family: 'Orbitron'; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pulsing { transform: scale(1.15); filter: brightness(1.3); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-frame">
        <div class="core-container">
            <div class="core-ring"></div>
            <div id="eye" class="eye-v3"></div>
        </div>
        <div style="font-size: 9px; letter-spacing: 3px; color: var(--neon); margin-bottom: 20px; font-weight: bold;">STARLINK NUCLEUS [LEARNING MODE]</div>
        <div class="terminal" id="terminal"></div>
        <input type="text" id="input-chat" placeholder="ENSERÑAR O COMANDAR..." autocomplete="off">
    </div>

    <script>
        // TU CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB2vNFczfkc0jx0asgo0yREqw5ewaVTXnY",
            authDomain: "starlink-proyect.firebaseapp.com",
            databaseURL: "https://starlink-proyect-default-rtdb.firebaseio.com",
            projectId: "starlink-proyect",
            storageBucket: "starlink-proyect.firebasestorage.app",
            messagingSenderId: "768944883652",
            appId: "1:768944883652:web:f4b205421c45be016e4691",
            measurementId: "G-P22T5TVPRE"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const terminal = document.getElementById('terminal');
        const eye = document.getElementById('eye');

        let modoAprendizaje = false;
        let ultimaPregunta = "";

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'es-MX';
            utter.onstart = () => eye.classList.add('pulsing');
            utter.onend = () => eye.classList.remove('pulsing');
            synth.speak(utter);
        }

        function addLog(quien, texto) {
            const div = document.createElement('div');
            div.className = quien === "Tú" ? "msg-user" : "msg-starlink";
            div.innerHTML = `> ${quien.toUpperCase()}: ${texto}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Lógica de "Mente en Blanco"
        async function procesarCerebro(mensaje) {
            const msg = mensaje.toLowerCase().trim();

            // Si está esperando que le enseñes la respuesta
            if (modoAprendizaje) {
                // Guardamos en Firebase usando la pregunta como llave
                // Limpiamos caracteres especiales para que Firebase no de error
                const key = ultimaPregunta.replace(/[.#$[\]]/g, ""); 
                await db.ref('conocimiento/' + key).set({ respuesta: mensaje });
                
                modoAprendizaje = false;
                const r = `CONOCIMIENTO ADQUIRIDO: CUANDO DIGAS "${ultimaPregunta}", RESPONDERÉ "${mensaje}".`;
                return r;
            }

            // Buscar en la memoria de Firebase
            const keyBusqueda = msg.replace(/[.#$[\]]/g, "");
            const snapshot = await db.ref('conocimiento/' + keyBusqueda).once('value');
            const data = snapshot.val();

            if (data) {
                return data.respuesta;
            } else {
                modoAprendizaje = true;
                ultimaPregunta = msg;
                return `NO TENGO REGISTRO DE "${msg}". JORGE, ¿QUÉ DEBERÍA RESPONDER A ESTO?`;
            }
        }

        // Inicio
        addLog("Starlink", "SISTEMA DE APRENDIZAJE ACTIVO. ESPERANDO ENTRADA.");

        document.getElementById('input-chat').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const val = e.target.value;
                addLog("Tú", val);
                e.target.value = "";
                
                // Procesar en el cerebro local de Firebase
                const respuesta = await procesarCerebro(val);
                
                addLog("Starlink", respuesta);
                speak(respuesta);
            }
        });

        // Animación del ojo con el mouse
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            eye.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
